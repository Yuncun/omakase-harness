# GoReleaser config — cross-compiles the omakase binary, publishes it as a
# GitHub Release, and updates the Homebrew cask in Yuncun/homebrew-tap. Driven
# by .github/workflows/release.yml on a vX.Y.Z tag push.
#
# PUBLISH LINE: pushing a vX.Y.Z tag IS publishing — the release and the cask
# ship in the same unattended run. Runbook: docs/releasing.md.
version: 2

project_name: omakase

builds:
  - id: omakase
    main: ./cmd/omakase
    binary: omakase
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: omakase
    formats: [tar.gz]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  # Published immediately: the cask below points at this release's tarballs in
  # the same run, and a cask pointing at a draft 404s for users. Pushing the
  # tag is therefore the outward "publish line" — see docs/releasing.md.
  draft: false

# Homebrew tap — each release rewrites the cask in Yuncun/homebrew-tap; users
# install with `brew install yuncun/tap/omakase`. (homebrew_casks is GoReleaser
# v2's replacement for the deprecated `brews`; validated against 2.16.)
homebrew_casks:
  - name: omakase
    repository:
      owner: Yuncun
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/Yuncun/omakase-harness"
    description: "Install a repo's local dev harness as a gitignored overlay"
    license: MIT
    # The binary is unsigned (no Apple Developer ID), and Homebrew quarantines
    # cask downloads — Gatekeeper SIGKILLs an unsigned quarantined binary on
    # first run. This post-install hook is GoReleaser's documented pattern for
    # exactly that case; proper signing/notarization is the eventual fix.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/omakase"]
          end
