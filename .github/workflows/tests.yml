name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Go vet, test, build
        run: |
          go vet ./... && go test ./... && CGO_ENABLED=0 go build -o dist/omakase ./cmd/omakase
      - run: npm install -g lefthook
      - name: Run test suites
        run: |
          export LEFTHOOK_BIN="$(command -v lefthook)"
          rc=0
          for t in tests/*.test.sh; do
            echo "=== $t ==="
            bash "$t" || rc=1
          done
          exit $rc
