# Sample harness hook wiring (gitignored via .git/info/exclude — never committed).
# This one file IS the harness — read it top to bottom to see everything that runs.
# Each `run` resolves from the repo root. The .omakase/bin/* helpers below are NOT shipped
# by this harness: they come from the omakase base harness, layered in underneath this
# harness's own files at install time. So this harness carries only its delta — its rule,
# its one gate, and this wiring.

# Swap lefthook's header box for the omakase banner without losing the run summary.
output: [summary, success, failure, execution_out]

pre-commit:
  jobs:
    # Branded header box (from the base harness). Runs first; its only output is the box.
    - name: omakase-banner
      run: bash .omakase/bin/omakase-banner.sh pre-commit
    # The sample gate: block a staged DO-NOT-COMMIT marker. Wrapped in the base harness's
    # omakase-ledger.sh so the run shows up in `omakase status` and the 🥡 status-line; the
    # wrapper passes the gate's exit code straight through (non-zero blocks the commit).
    - name: block-marker
      run: bash .omakase/bin/omakase-ledger.sh block-marker -- bash .omakase/gates/block-marker.sh
      env:
        OMAKASE_HOOK: pre-commit

# Worktree auto-install (from the base harness): on checkout, copy any MISSING injected
# file into the worktree. Never overwrites a local edit, never touches a tracked path.
post-checkout:
  jobs:
    - name: omakase-ensure-present
      run: bash "$(git rev-parse --git-common-dir)/omakase/ensure-present.sh"
