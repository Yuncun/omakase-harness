# Personal hook wiring (gitignored via .git/info/exclude — never committed).
# This one file IS your harness — read it top to bottom to see everything that runs.
# Gates group by type; add more of a type, don't special-case:
#   scoped checkers   — fast, staged-file-scoped; run per-commit (pre-commit).
#   complete checkers — whole-project; run per-push (pre-push).
# Each `run` resolves from the repo root.

# Swap lefthook's header box for the omakase banner WITHOUT losing the run summary:
# drop only `meta` (lefthook's gradient header box) and keep summary/success/failure
# plus each gate's own output. The omakase-banner job below prints the branded box in
# place of the dropped header; the summary still lists every gate + timing at the end
# (it earns its keep on a multi-job pre-push). Want lefthook's header box back? add `meta`.
output: [summary, success, failure, execution_out]

pre-commit:
  jobs:
    # Branded header box (replaces lefthook's). Runs first; its only output is the box.
    - name: omakase-banner
      run: bash .omakase/bin/omakase-banner.sh pre-commit
    # --- scoped checker (the shipped example: blocks staged merge-conflict markers) ---
    # Wrapped in omakase-ledger.sh so the run lands in the scorecard ledger; it passes
    # the gate's exit code straight through. Wrap your own gates the same way to have
    # them show up in `/omakase show` and the 🍣 status-line segment; or call the gate
    # directly to keep it off the scorecard. OMAKASE_HOOK is the trigger label.
    - name: omakase-example
      run: bash .omakase/bin/omakase-ledger.sh omakase-example -- bash .omakase/gates/example.sh
      env:
        OMAKASE_HOOK: pre-commit

# --- pre-push: complete checkers + deferred gates. Left commented so this example
# --- harness installs cleanly on any repo. Uncomment and adapt to your stack.
# pre-push:
#   parallel: true
#   jobs:
#     # complete checker — your whole-project checks run IN the hook; non-zero blocks.
#     - name: tests
#       run: bash .omakase/bin/omakase-ledger.sh tests -- <your test command, e.g. npm test>
#       env: { OMAKASE_HOOK: pre-push }
#     # deferred gate — for a slow / non-deterministic check (a render, an LLM review)
#     # that can't run in a hook. A job records the result in-session with:
#     #   bash .omakase/bin/omakase-record.sh --check review --verdict pass
#     # and this push gate blocks unless a fresh PASS exists for the commit.
#     - name: deferred-check-review
#       run: bash .omakase/bin/omakase-ledger.sh review -- bash .omakase/gates/deferred-check.sh
#       env:
#         OMAKASE_CHECK: review            # matches --check above; UNSET = dormant
#         OMAKASE_GLOB: 'src/* lib/*'      # gate fires only when a pushed file matches
#         OMAKASE_HOOK: pre-push

# Worktree auto-install: on every checkout (including `git worktree add`), copy any
# MISSING injected file into this worktree from the shared snapshot. Never
# overwrites a local edit, never touches a tracked path. The script lives in the
# shared git dir, so it is reachable from any worktree. Written by init.sh.
post-checkout:
  jobs:
    - name: omakase-ensure-present
      run: bash "$(git rev-parse --git-common-dir)/omakase/ensure-present.sh"
