name: release

# Runs only on a version-tag push. GoReleaser cross-compiles the binary
# (.goreleaser.yaml) and uploads it to a DRAFT GitHub Release — a maintainer
# reviews and clicks Publish. Runbook: docs/releasing.md.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release + upload artifacts

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history: goreleaser derives the changelog from tag..tag
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Preflight — a tag can point at any commit, so re-prove the build here
      # rather than trusting that main's tests workflow covered it.
      - name: Go vet + test
        run: go vet ./... && go test ./...
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
